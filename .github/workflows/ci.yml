name: AeroStream CI/CD

on:
  push:
    branches: [ main ]

# Give GitHub permission to write to its own Container Registry
permissions:
  packages: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test
        run: dotnet test

  deploy:
    needs: build-and-test # Only deploy if tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push API Image
        run: |
          # Convert username to lowercase for Docker naming conventions
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/aerostream-api
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          # Fix: Use the Root Dockerfile
          docker build -t $IMAGE_ID:latest -f Dockerfile .
          docker push $IMAGE_ID:latest

      - name: Build and Push Dashboard Image
        run: |
          # Convert username to lowercase
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/aerostream-dashboard
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          # Fix: Use the Dashboard Dockerfile and set its specific folder as context
          docker build -t $IMAGE_ID:latest -f src/AeroStream.Dashboard/Dockerfile src/AeroStream.Dashboard
          docker push $IMAGE_ID:latest